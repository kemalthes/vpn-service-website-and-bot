global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'subscribe-link-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['link-service:8080']

  - job_name: 'telegram-bot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['telegram-bot:8081']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']